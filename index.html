<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Null Convergence, LLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void: #000000;
      --deep: #050508;
      --star: #ffffff;
      --gold: #c9a84c;
      --gold-dim: #8a6f2e;
      --cream: #e8dfc8;
      --glow: rgba(201, 168, 76, 0.4);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--void);
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
      box-shadow: 0 0 8px var(--glow);
    }

    /* =================== STARFIELD =================== */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 3s ease;
    }

    #starfield.visible { opacity: 1; }

    /* =================== SINGULARITY STAGE =================== */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* The singularity point */
    #singularity {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--star);
      border-radius: 50%;
      box-shadow:
        0 0 6px 2px rgba(255,255,255,0.9),
        0 0 20px 6px rgba(201,168,76,0.6),
        0 0 60px 20px rgba(201,168,76,0.2);
      opacity: 0;
      transform: scale(0);
      animation: singularity-birth 1.2s ease-out 0.8s forwards;
    }

    @keyframes singularity-birth {
      0% { opacity: 0; transform: scale(0); }
      40% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px 2px rgba(255,255,255,0.9), 0 0 20px 6px rgba(201,168,76,0.6), 0 0 60px 20px rgba(201,168,76,0.2); }
      70% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 10px 4px rgba(255,255,255,0.9), 0 0 40px 14px rgba(201,168,76,0.7), 0 0 120px 50px rgba(201,168,76,0.3); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Expansion ring */
    #expansion-ring {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.8);
      opacity: 0;
      animation: expand-ring 1.8s ease-out 2.2s forwards;
    }

    @keyframes expand-ring {
      0% { opacity: 0.9; transform: scale(1); }
      100% { opacity: 0; transform: scale(400); }
    }

    /* Logo container */
    #logo-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: scale(0.2);
      animation: logo-emerge 2s cubic-bezier(0.16, 1, 0.3, 1) 3.8s forwards;
    }

    @keyframes logo-emerge {
      0% { opacity: 0; transform: scale(0.2); filter: blur(20px); }
      30% { opacity: 0.6; filter: blur(8px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    #logo-img {
      width: min(340px, 78vw);
      height: auto;
      filter: drop-shadow(0 0 30px rgba(201,168,76,0.3));
      animation: logo-glow-pulse 4s ease-in-out 6s infinite;
    }

    @keyframes logo-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(201,168,76,0.3)); }
      50% { filter: drop-shadow(0 0 50px rgba(201,168,76,0.5)); }
    }

    /* Welcome text */
    #welcome {
      margin-top: 40px;
      font-family: 'Cinzel', serif;
      font-size: clamp(11px, 2vw, 15px);
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0;
      animation: welcome-fade 2s ease 6.5s forwards;
    }

    @keyframes welcome-fade {
      0% { opacity: 0; transform: translateY(12px); letter-spacing: 0.8em; }
      100% { opacity: 0.85; transform: translateY(0); letter-spacing: 0.5em; }
    }

    /* Contact section */
    #contact {
      margin-top: 28px;
      opacity: 0;
      animation: contact-fade 1.5s ease 8s forwards;
      text-align: center;
    }

    @keyframes contact-fade {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #contact a {
      font-family: 'EB Garamond', serif;
      font-size: clamp(12px, 1.8vw, 15px);
      color: var(--cream);
      text-decoration: none;
      letter-spacing: 0.15em;
      opacity: 0.7;
      transition: opacity 0.3s, color 0.3s;
    }

    #contact a:hover {
      opacity: 1;
      color: var(--gold);
    }

    /* Grain overlay */
    #grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      z-index: 5;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grain-shift 0.5s steps(2) infinite;
    }

    @keyframes grain-shift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(-1%, -1%); }
      100% { transform: translate(1%, 1%); }
    }

    /* Vignette */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div id="grain"></div>
  <div id="vignette"></div>

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Main stage -->
  <div id="stage">
    <div id="singularity"></div>
    <div id="expansion-ring"></div>

    <div id="logo-container">
      <img id="logo-img" src="Null.png" alt="Null Convergence LLC">
      <div id="welcome">Welcome.</div>
      <div id="contact">
        <a href="mailto:NullConvergence@gmail.com">NullConvergence@gmail.com</a>
      </div>
    </div>
  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // Starfield
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 280 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.7 + 0.1,
      speed: Math.random() * 0.0003 + 0.0001,
      phase: Math.random() * Math.PI * 2
    }));

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const twinkle = s.a * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    // Reveal starfield after singularity birth
    setTimeout(() => {
      canvas.classList.add('visible');
      requestAnimationFrame(drawStars);
    }, 1800);
  </script>
</body>
</html>
